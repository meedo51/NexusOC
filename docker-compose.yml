services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusoc-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - nexusoc-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusoc-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexusoc:${DB_PASSWORD}@db:5432/nexusoc
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - STORAGE_DIR=/data/storage
      - LOG_LEVEL=INFO
    volumes:
      - backend_data:/data/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - nexusoc-net

  db:
    image: postgres:16-alpine
    container_name: nexusoc-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=nexusoc
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=nexusoc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusoc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexusoc-net

  redis:
    image: redis:7-alpine
    container_name: nexusoc-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - nexusoc-net

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  nexusoc-net:
    driver: bridge
