# ─── NexusOC — nginx reverse proxy config for ai.xus.me ─────────────────
# Place this file at /etc/nginx/conf.d/ai.xus.me.conf
#
# Prerequisites:
#   1. Get SSL certs: certbot certonly --nginx -d ai.xus.me
#   2. Reload nginx:  nginx -t && systemctl reload nginx
#
# The Docker services expose ports on 127.0.0.1 only:
#   frontend → 127.0.0.1:3000
#   backend  → 127.0.0.1:8000

upstream nexusoc-frontend {
    server 127.0.0.1:3000;
}

upstream nexusoc-backend {
    server 127.0.0.1:8000;
}

# ─── HTTPS server ──────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ai.xus.me;

    # SSL — generated by certbot
    ssl_certificate     /etc/letsencrypt/live/ai.xus.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.xus.me/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ai.xus.me/chain.pem;

    # Modern TLS config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Favicon
    location = /favicon.ico {
        proxy_pass http://nexusoc-frontend;
        proxy_set_header Host $host;
        proxy_cache_valid 200 302 24h;
        expires 24h;
        access_log off;
        log_not_found off;
    }

    # API — proxy to FastAPI backend
    location /api/ {
        proxy_pass http://nexusoc-backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Disable buffering for SSE streaming
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # WebSocket — for future use
    location /ws/ {
        proxy_pass http://nexusoc-backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Frontend — Next.js SPA
    location / {
        proxy_pass http://nexusoc-frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # Next.js uses WebSockets for HMR in dev, not needed in prod
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://nexusoc-frontend;
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name ai.xus.me;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }
}
